<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポケモン図鑑 V2 遷移プロトタイプ</title>
    <style>
        body { font-family: sans-serif; background: #eef2f7; display: flex; justify-content: center; padding: 20px; }
        .container { width: 400px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* タブのスタイル */
        .tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; }
        .tab { padding: 8px 12px; background: #ddd; border-radius: 10px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .tab.active { background: #ffcb05; font-weight: bold; }
        
        /* 画面切り替え用 */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* 図鑑グリッド */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .poke-item { border: 1px solid #ccc; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
        
        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ポケモンずかん</h2>
    <div id="tabs" class="tabs"></div>
    <div id="screen-zukan" class="screen active">
        <div id="grid" class="grid"></div>
    </div>
</div>

<div id="poke-modal" class="modal" onclick="this.classList.remove('active')">
    <div class="modal-content">
        <h3>ポケモン詳細</h3>
        <p>ここに詳細情報（高さ・重さ・タイプ・説明文）が入ります。</p>
        <button>閉じる</button>
    </div>
</div>

<script>
    // 9世代分のタブを生成
    const tabs = document.getElementById('tabs');
    for(let i=1; i<=9; i++) {
        tabs.innerHTML += `<div class="tab ${i===1?'active':''}" onclick="selectGen(this, ${i})">第${i}世代</div>`;
    }

    function selectGen(el, gen) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        // ここで表示を切り替える（現在はログのみ）
        console.log(`第${gen}世代のデータ読み込み中...`);
        renderGrid(gen);
    }

    function renderGrid(gen) {
        const grid = document.getElementById('grid');
        grid.innerHTML = Array.from({length: 6}, (_, i) => `
            <div class="poke-item" onclick="document.getElementById('poke-modal').classList.add('active')">
                No.${(gen-1)*100 + i + 1}<br>???
            </div>
        `).join('');
    }

    renderGrid(1); // 初期表示
</script>
</body>
</html>
