<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンさんすうアプリ V2統合版</title>
    <style>
        :root { --primary-color: #ffcb05; --secondary-color: #3b4cca; --bg-color: #eef2f7; --card-bg: #ffffff; --text-color: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 20px; box-sizing: border-box; text-align: center; }
        
        /* 管理者パネル用スタイル */
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #fff1f2; border: 2px dashed #f43f5e; border-radius: 10px; }
        #debug-log { width: 100%; margin-top: 15px; padding: 10px; background: #1e293b; color: #38bdf8; font-family: monospace; font-size: 11px; border-radius: 10px; text-align: left; max-height: 100px; overflow-y: auto; border: 2px solid #38bdf8; }
        
        /* 既存スタイル */
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; gap: 15px; }
        button { background-color: var(--secondary-color); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cbd5e1; }
        button.yellow { background-color: var(--primary-color); color: var(--secondary-color); }
        .zukan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 350px; overflow-y: auto; padding: 10px; background: #f8fafc; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

</html>
