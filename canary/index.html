<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンさんすう V2 開発・マスターデータ管理ダッシュボード</title>

    <style>
        :root {
            --primary-color: #ffcb05;
            --secondary-color: #3b4cca;
            --bg-color: #eef2f7;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --danger-color: #f43f5e;
            --success-color: #10b981;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 800px; /* ダッシュボード検証用に幅を拡張 */
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            color: var(--secondary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }
        .admin-panel {
            margin-bottom: 25px;
            padding: 20px;
            background: #fff1f2;
            border: 2px dashed var(--danger-color);
            border-radius: 12px;
            text-align: center;
        }
        .admin-title {
            font-weight: bold;
            color: var(--danger-color);
            margin-bottom: 10px;
            font-size: 15px;
        }
        .btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background-color: #e11d48; }
        .btn:active { transform: scale(0.98); }
        
        .log-box {
            background: #0f172a;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            height: 150px;
            overflow-y: auto;
            font-size: 11px;
            border-radius: 6px;
            text-align: left;
            margin-top: 15px;
            line-height: 1.5;
        }
