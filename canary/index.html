<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンさんすうアプリ V2準備版</title>
    <style>
        /* スタイルは既存を維持 */
        :root { --primary-color: #ffcb05; --secondary-color: #3b4cca; --bg-color: #eef2f7; --card-bg: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .admin-panel { margin: 20px 0; padding: 15px; background: #fff1f2; border: 2px dashed #f43f5e; border-radius: 10px; }
        .log-box { background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 150px; overflow-y: auto; font-size: 12px; margin-top: 10px; }
        button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border-radius: 5px; border: none; background: #e11d48; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>V2 開発用ダッシュボード</h1>

        <div class="admin-panel" id="admin-panel">
            <h3 style="margin-top:0;">🛠️ V2 移行管理</h3>
            <button onclick="rebuildMasterData()">1. 全世代マスター構築</button>
            <button onclick="migrateUserData()">2. ユーザーデータ移行</button>
            <button onclick="checkIntegrity()">3. 整合性チェック</button>
        </div>

        <div id="debug-log" class="log-box"></div>
    </div>

    <script>
        // ログ出力関数
        function logToScreen(msg) {
            const log = document.getElementById('debug-log');
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        // 1. マスターデータ構築 (API制限対策つき)
        async function rebuildMasterData() {
            logToScreen("構築開始: API 1秒ウェイトあり");
            for (let gen = 1; gen <= 9; gen++) {
                try {
                    logToScreen(`Gen ${gen} 取得中...`);
                    // API取得処理の擬似コード (実際はここでfetch)
                    await new Promise(r => setTimeout(r, 1000)); 
                    
                    // Firestoreへの保存 (上書き)
                    // await db.collection('masters').doc(`gen_${gen}`).set({...});
                    logToScreen(`Gen ${gen} 保存完了`);
                } catch (e) {
                    logToScreen(`エラー: ${e.message}`);
                }
            }
            logToScreen("全てのマスター構築完了");
        }

        // 2. ユーザーデータ移行
        async function migrateUserData() {
            logToScreen("ユーザー移行開始...");
            // db.collection('users').get() で旧データを読み込み
            // 新規コレクション users_v2 へコンバートして set()
            logToScreen("移行完了 (V1はReadのみ実施)");
        }

        // 3. 整合性チェック
        async function checkIntegrity() {
            logToScreen("整合性チェック実行中...");
            // V1とV2の差分比較ロジック
        }
    </script>
</body>
</html>
