<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンさんすう V2 開発版</title>
    <style>
        :root { --primary-color: #ffcb05; --secondary-color: #3b4cca; --bg-color: #eef2f7; --card-bg: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .admin-panel { margin-bottom: 20px; padding: 15px; background: #fff1f2; border: 2px dashed #f43f5e; border-radius: 10px; }
        .log-box { background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 120px; overflow-y: auto; font-size: 11px; margin-top: 10px; }
        .tab-container { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 10px; background: #e2e8f0; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .zukan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #ccc; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <h1>V2 開発ダッシュボード</h1>
        <div class="admin-panel">
            <button onclick="rebuildMasterData()">1. 全世代マスター構築</button>
        </div>
        <div id="debug-log" class="log-box">ログ: 待機中...</div>
        <hr>
        <h2>図鑑 (世代切替)</h2>
        <div class="tab-container" id="tabs"></div>
        <div class="zukan-grid" id="zukan-container"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeFo0Xwsr4QgwCHVKrc5kIT03Rvfe7xQw",
            authDomain: "pokemon-math-app.firebaseapp.com",
            projectId: "pokemon-math-app",
            storageBucket: "pokemon-math-app.firebasestorage.app",
            messagingSenderId: "1002462273438",
            appId: "1:1002462273438:web:646cd240932dfaf6cd808f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const GEN_CONFIG = [
            { id: 1, start: 1, end: 151 }, { id: 2, start: 152, end: 251 }, { id: 3, start: 252, end: 386 },
            { id: 4, start: 387, end: 493 }, { id: 5, start: 494, end: 649 }, { id: 6, start: 650, end: 721 },
            { id: 7, start: 722, end: 809 }, { id: 8, start: 810, end: 905 }, { id: 9, start: 906, end: 1025 }
        ];

        function logToScreen(msg) {
            const time = new Date().toLocaleTimeString();
            document.getElementById('debug-log').innerHTML += `<div>[${time}] ${msg}</div>`;
        }

        async function rebuildMasterData() {
            logToScreen("構築開始...");
            for (const gen of GEN_CONFIG) {
                logToScreen(`Gen ${gen.id} 取得中...`);
                let list = [];
                for (let nid = gen.start; nid <= gen.end; nid++) {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${nid}`);
                    const data = await res.json();
                    list.push({ id: nid, name: data.name, image: data.sprites.front_default });
                    await new Promise(r => setTimeout(r, 50)); 
                }
                await db.collection('masters').doc(`gen_${gen.id}`).set({ pokemon_list: list });
                logToScreen(`Gen ${gen.id} 保存完了`);
            }
        }

        async function loadZukan(genId) {
            const snap = await db.collection('masters').doc(`gen_${genId}`).get();
            if (!snap.exists) { logToScreen("データ未検出"); return; }
            const container = document.getElementById('zukan-container');
            container.innerHTML = "";
            snap.data().pokemon_list.forEach(p => {
                container.innerHTML += `<div style="text-align:center;"><img src="${p.image}" width="40"><br>${p.name}</div>`;
            });
        }

        const tabs = document.getElementById('tabs');
        GEN_CONFIG.forEach(g => {
            tabs.innerHTML += `<div class="tab-btn" onclick="loadZukan(${g.id})">Gen${g.id}</div>`;
        });
    </script>
</body>
</html>
